<!doctype html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>نسيت كلمة المرور - ZAHA Flow Theme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link id="bootstrapCss" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="./css/Theme.css">
  <link rel="stylesheet" href="./css/Style.css">
</head>
<body>
  <main class="auth-layout container-fluid">
    <div class="row min-vh-100 align-items-center justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="card auth-card border-0 shadow-lg">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <img src="./assets/logos/logo2.svg" alt="ZAHA Logo" class="auth-logo mb-2">
              <h1 class="h4 mb-1">استعادة كلمة المرور</h1>
              <p class="text-muted mb-0">أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة التعيين.</p>
            </div>

            <form class="row g-3">
              <div class="col-12">
                <label class="form-label">البريد الإلكتروني</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                  <input type="email" class="form-control" placeholder="name@zahaflow.com" required>
                </div>
              </div>
              <div class="col-12 d-grid">
                <button type="submit" class="btn btn-theme btn-lg">إرسال رابط الاستعادة</button>
              </div>
            </form>

            <div class="text-center mt-4">
              <a href="./Login.html" class="text-decoration-none">العودة لتسجيل الدخول</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="./js/app.js"></script>
</body>
</html>
