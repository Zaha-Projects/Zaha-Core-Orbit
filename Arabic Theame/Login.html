<!doctype html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول - ZAHA Flow Theme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link id="bootstrapCss" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="./css/Theme.css">
  <link rel="stylesheet" href="./css/Style.css">
</head>
<body>
  <main class="auth-layout container-fluid">
    <div class="row min-vh-100 align-items-center justify-content-center">
      <div class="col-12 col-md-10 col-lg-8 col-xl-6">
        <div class="card auth-card shadow-lg border-0">
          <div class="row g-0">
            <div class="col-lg-5 d-none d-lg-flex auth-cover">
              <div>
                <h2 class="h4 mb-3">ZAHA Flow Theme</h2>
                <p class="mb-0">واجهة دخول احترافية متوافقة مع الهوية البصرية للمشروع.</p>
              </div>
            </div>
            <div class="col-lg-7">
              <div class="card-body p-4 p-md-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                  <div class="d-flex align-items-center gap-2">
                    <img src="./assets/logos/logo2.svg" alt="ZAHA Logo" class="auth-logo">
                    <div>
                      <h1 class="h5 mb-0">ZAHA Flow</h1>
                      <small class="text-muted">لوحة إدارة المشاريع</small>
                    </div>
                  </div>
                  <button class="btn btn-sm btn-outline-secondary" id="themeToggle" type="button">🌙 داكن</button>
                </div>

                <h2 class="h4 mb-2">تسجيل الدخول</h2>
                <p class="text-muted mb-4">أدخل بياناتك للوصول إلى النظام.</p>

                <form class="row g-3">
                  <div class="col-12">
                    <label class="form-label">البريد الإلكتروني</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                      <input type="email" class="form-control" placeholder="name@zahaflow.com" required>
                    </div>
                  </div>
                  <div class="col-12">
                    <label class="form-label">كلمة المرور</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                      <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>
                  </div>
                  <div class="col-12 d-flex justify-content-between align-items-center">
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" id="rememberMe">
                      <label class="form-check-label" for="rememberMe">تذكرني</label>
                    </div>
                    <a href="./forgot-password.html" class="link-primary fw-semibold">نسيت كلمة المرور؟</a>
                  </div>
                  <div class="col-12 d-grid">
                    <button type="submit" class="btn btn-theme btn-lg">دخول</button>
                  </div>
                </form>

                <div class="text-center mt-4">
                  <a href="./index.html" class="text-decoration-none">العودة إلى الرئيسية</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="./js/app.js"></script>
</body>
</html>
